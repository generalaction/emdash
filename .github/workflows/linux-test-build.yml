name: Linux Test Build

on:
  push:
    branches:
      - fix-linux-startup-issue-hs4zr
  workflow_dispatch:

jobs:
  linux-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsecret-1-dev rpm

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Rebuild native modules for Electron
        run: node --experimental-strip-types scripts/release/rebuild-native.ts --arch x64

      - name: Build Linux AppImage
        run: pnpm exec electron-builder --linux AppImage --x64 --publish never --config electron-builder.config.ts --config.npmRebuild=false

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: emdash-linux-test-build
          path: release/*.AppImage
