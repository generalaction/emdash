name: Sync Upstream

on:
  schedule:
    # Mondays 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  UPSTREAM_REPO: generalaction/emdash
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_BRANCH}:refs/remotes/upstream/${UPSTREAM_BRANCH}"

      - name: Count commits behind
        id: diff
        run: |
          git fetch origin "${TARGET_BRANCH}"
          git checkout -B "${TARGET_BRANCH}" FETCH_HEAD
          ahead=$(git rev-list --count "HEAD..refs/remotes/upstream/${UPSTREAM_BRANCH}")
          echo "ahead=${ahead}" >> "$GITHUB_OUTPUT"
          echo "Commits behind upstream: ${ahead}"

      - name: Up to date — exit
        if: steps.diff.outputs.ahead == '0'
        run: echo "Already up to date with upstream/${UPSTREAM_BRANCH}. Nothing to do."

      - name: Check for open sync PR
        if: steps.diff.outputs.ahead != '0'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --state open --base "${TARGET_BRANCH}" --search "in:title chore: sync upstream main" --json number --jq '.[0].number' || echo '')
          if [ -n "$existing" ]; then
            echo "An open sync PR already exists (#${existing})."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch
        if: steps.diff.outputs.ahead != '0'
        id: branch
        run: |
          name="chore/sync-upstream-$(date -u +%Y%m%d-%H%M)"
          git checkout -b "$name"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Attempt merge
        if: steps.diff.outputs.ahead != '0'
        id: merge
        run: |
          set +e
          git merge "refs/remotes/upstream/${UPSTREAM_BRANCH}" --no-edit
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            conflicts=$(git diff --name-only --diff-filter=U | tr '\n' ' ' | sed 's/ *$//')
            echo "had_conflicts=true" >> "$GITHUB_OUTPUT"
            {
              echo "conflicts<<EOF"
              echo "$conflicts"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            git merge --abort
          else
            echo "had_conflicts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push clean sync to target branch
        if: steps.diff.outputs.ahead != '0' && steps.merge.outputs.had_conflicts == 'false'
        run: |
          git checkout "${TARGET_BRANCH}"
          git merge --ff-only "${{ steps.branch.outputs.name }}"
          git push origin "${TARGET_BRANCH}:${TARGET_BRANCH}"

      - name: Open conflict issue
        if: steps.diff.outputs.ahead != '0' && steps.existing.outputs.skip == 'false' && steps.merge.outputs.had_conflicts == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Upstream sync needs manual resolution ($(date -u +%Y-%m-%d))" \
            --body "$(cat <<EOF
          Automated merge of \`upstream/${UPSTREAM_BRANCH}\` into \`main\` hit conflicts.

          - Commits behind: **${{ steps.diff.outputs.ahead }}**
          - Conflicting files:
          \`\`\`
          ${{ steps.merge.outputs.conflicts }}
          \`\`\`

          ## Resolve locally

          \`\`\`bash
          git fetch upstream
          git checkout -b chore/sync-upstream-manual main
          git merge upstream/${UPSTREAM_BRANCH}
          # resolve conflicts, then:
          git commit
          git push -u origin HEAD
          gh pr create --base main --title "chore: sync upstream main"
          \`\`\`

          ### High-churn areas to check first

          - \`src/main/db/schema.ts\` + \`drizzle/\` migration ordering
          - \`src/main/services/ptyManager.ts\` (or its successor in \`src/main/core/pty/\`)
          - \`src/renderer/features/tasks/main-panel.tsx\`
          - \`src/renderer/app/modal-registry.ts\`

          🤖 Generated by .github/workflows/sync-upstream.yml
          EOF
          )"
