<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emdash Beta</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('emdash-theme');
          var theme = raw ? JSON.parse(raw) : 'emlight';
          var root = document.documentElement;
          if (theme === 'emlight') root.classList.add('emlight');
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
